name: CI

on:
  push:
    branches: [main, master, "claude/**"]   # `master` kept during the rename window
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke (Neovim ${{ matrix.neovim-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim-version: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim ${{ matrix.neovim-version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Smoke test (single end-to-end command)
        run: make smoke

  test:
    name: Tests (Neovim ${{ matrix.neovim-version }})
    runs-on: ubuntu-latest
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        neovim-version: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim ${{ matrix.neovim-version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Cache mini.test
        uses: actions/cache@v4
        with:
          path: tests/.deps/mini.test
          key: mini-test-${{ hashFiles('Makefile') }}

      - name: Install mini.test
        run: make test-deps

      - name: Run full test suite
        run: make test

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headlights-ci-log-${{ matrix.neovim-version }}
          path: |
            /tmp/headlights*.log
            /tmp/headlights-smoke.stderr
          if-no-files-found: ignore

  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: make lint
