name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests — Neovim ${{ matrix.neovim-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim-version: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim ${{ matrix.neovim-version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim-version }}

      - name: Cache plenary.nvim
        uses: actions/cache@v4
        with:
          path: ~/.local/share/nvim/lazy/plenary.nvim
          key: plenary-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Install plenary.nvim
        run: |
          if [ ! -d ~/.local/share/nvim/lazy/plenary.nvim ]; then
            mkdir -p ~/.local/share/nvim/lazy
            git clone --depth=1 \
              https://github.com/nvim-lua/plenary.nvim \
              ~/.local/share/nvim/lazy/plenary.nvim
          fi

      - name: Run tests
        run: PLENARY=~/.local/share/nvim/lazy/plenary.nvim make test

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: headlights-ci-log-${{ matrix.neovim-version }}
          path: /tmp/headlights_ci_*.log
          if-no-files-found: ignore
